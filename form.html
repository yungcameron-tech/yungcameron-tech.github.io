
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
    <style>
        /* Modern Reset & Global Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f7f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Form Container styling */
        .form-container {
            background: #ffffff;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            text-align: center;
            color: #2e7d32; /* Friendlier, more professional green */
            margin-bottom: 24px;
            font-size: 24px;
        }

        /* Layout and spacing */
        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #333333;
            font-size: 14px;
        }

        /* Input Fields styling */
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #2e7d32;
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.15);
        }

        /* Gender Section styling */
        .gender-group {
            margin: 20px 0;
        }

        .gender-options {
            display: flex;
            gap: 20px;
            margin-top: 6px;
        }

        .gender-options label {
            display: flex;
            align-items: center;
            font-weight: normal;
            cursor: pointer;
        }

        .gender-options input[type="radio"] {
            margin-right: 8px;
            accent-color: #2e7d32; /* Matches the green theme */
        }

        /* Professional & Interactive Button styling */
        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            background-color: #2e7d32;
            color: white;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #1b5e20;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Create an Account</h2>

    <form>
        <div class="form-group">
            <label for="surname">Surname</label>
            <input type="text" id="surname" placeholder="e.g., Smith" required>
        </div>

        <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" placeholder="e.g., Jane" required>
        </div>

        <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" placeholder="e.g., Doe" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="name@example.com" required>
        </div>

        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="Enter your phone number" required>
        </div>

        <div class="form-group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Create a strong password" required>
        </div>

        <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Repeat your password" required>
        </div>

        <div class="gender-group">
            <label>Gender</label>
            <div class="gender-options">
                <label><input type="radio" name="gender" value="Male"> Male</label>
                <label><input type="radio" name="gender" value="Female"> Female</label>
            </div>
        </div>

        <button type="submit">Register</button>
    </form>
</div>

</body>
</html>
